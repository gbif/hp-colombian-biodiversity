blank: 
  klass: container
  markdownContent: |
    <div class="container box">
      <!-- Selector de años -->
      <h3>
       <span class="title is-4">Uso de datos de Colombia desde</span>
       <span class="select"><select id="use-year-start"></select></span>
       <span class="title is-4">hasta</span>
       <span class="select"><select id="use-year-end"></select></span>
        <span id="results-count" class="tag is-success"></span>
      </h3>
      <p>Cambia el rango de años en los menús desplegables de arriba para cargar los temas y publicaciones que usaron datos compartidos por medio del SiB Colombia y GBIF, con su <a href="https://techdocs.gbif.org/en/openapi/v1/literature#/">API literature</a>.</p>
    
      <hr>
      
      <!-- Gráfica de temas-->
      <figure>
       <h3 id="use-chart-title" class="title is-5"></h3>
       <div id="use-chart-topics"></div>
      </figure>
      
      
      <!-- Tabla con paginación -->
      <h3 class="title is-5">Publicaciones que usaron los datos <span class="use_date_range"></span></h3>
      <div id="use-table-count"></div>
      
      <table id="use-table">
       <thead>
         <tr>
           <th>
            <span class="select">
              <select id="use-filter-year">
                <option value="">Año</option>
              </select>
            </span>
          </th>
           <th><input id="use-filter-title" class="input" placeholder="Publicación"></th>
           <th>
            <span class="select">
              <select id="use-filter-topics">
                <option value="">Tema</option>
              </select>
            </span>
          </th>
           <th>
            <span class="select">
              <select id="use-filter-openaccess">
               <option value="">Acceso abierto</option>
               <option value="true">Sí</option>
               <option value="false">No</option>
             </select>
            </span>
           </th>
           <th>
            <span class="select">
              <select id="use-filter-countries">
                <option value="">País/Autores</option>
              </select>
            </span>
          </th>
           <th>
            <span class="select">
              <select id="use-filter-type">
                <option value="">Tipo</option>
              </select>
            </span>
          </th>
         </tr>
       </thead>
       <tbody></tbody>
      </table>
      
       <div id="use-pagination" class="pagination"></div>
    </div>
        
    <!-- Highcharts -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <script src="https://code.highcharts.com/themes/adaptive.js"></script>
    <script src="https://revistabioika.org/es/usos/usecases.js"></script>

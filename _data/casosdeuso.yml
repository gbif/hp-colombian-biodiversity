videoPrincipal:
  markdownContent: |
    <p class="video-container"><iframe src="https://www.youtube.com/embed/CVDJ6acigYM" width="640" height="360" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></p>
    
    <p>Los casos de uso son la aplicación práctica de datos abiertos sobre biodiversidad (registros biológicos, listas de especies, eventos de muestreo), información o cifras compartidas en las plataformas del SiB Colombia, usados para tomar decisiones, generar nuevo conocimiento, apoyar procesos de educación o crear productos de información.</p>

    <hr>
    
    <details>
        <summary markdown="span" style="background-color: #eee; padding: 20px;"><b>¿Qué tipos de casos de uso de datos existen?</b></summary>
    
    <br>
    
     <blockquote>
       
       <p>Aunque el uso de datos, cifras e información puede ser muy amplio, para orientar selección de los casos destacados, se tipifican dos categorías según los objetivos asociados.</p>
       <ol>
          <li>
             <p><strong>Casos de uso estratégico y aplicado de los datos</strong>: soportan la toma de decisiones, generan conocimiento, aportan a políticas, indicadores o planificación, se traducen en acciones concretas de conservación o educación.</p>
             <p><strong>Tipos:</strong></p>
             <ul>
                <li>Educación y apropiación: aplicaciones en materiales de educación-pedagogía.</li>
                <li>Investigación científica: publicaciones editoriales, modelos, análisis ecológicos y afines.</li>
                <li>Política pública, planificación y gestión ambiental: planes de conservación, ordenamiento, PAB 2030, evaluaciones de impacto, informes de gestión, proyectos de monitoreo.</li>
             </ul>
             <p>👉 <strong>Ejemplo</strong>: uso de datos del SiB para actualizar el plan de conservación de felinos → evidencia para toma de decisiones (2a) + aporte a políticas (2b).</p>
          </li>
          <li>
             <p><strong>Casos de uso orientados al acceso, visibilidad y fortalecimiento de capacidades regionales</strong>: promueven el uso de las plataformas del SiB, visibilizan procesos de publicación y acceso a datos, fortalecen capacidades institucionales o comunitarias, generan confianza, apropiación o fortalecen redes.</p>
             <p><strong>Tipos:</strong></p>
             <ul>
                <li>Articulación y colaboración: comunidades usando/interactuando con datos en procesos de acompañamiento o redes, alianzas entre actores a partir de proceso de gestión de datos.</li>
                <li>Comunicación y periodismo de datos: historias basadas en flujos de datos y experiencias.</li>
                <li>Innovación y tecnología: apps, sistemas de información, portales.</li>
             </ul>
             <p>strong>Ejemplo</strong>: historia de una autoridad ambiental que aprende a publicar datos y luego los usa en su gestión → uso de plataforma (2d) + fortalecimiento de capacidades (3b).</p>
          </li>
       </ol>
       
     </blockquote>
    
    </details>

    <hr>

